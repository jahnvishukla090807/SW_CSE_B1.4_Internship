<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

    <header>
        <h2>Registration Form</h2>
    </header>
    
    <main>
        <form action="#" method="POST">
            <p>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </p>
            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </p>
            <p>
                <label for="pass">Password:</label>
                <input type="password" id="pass" name="pass" required>
            </p>

            <p>
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob">
            </p>
            <p>
                <label for="course">Course:</label>
                <select id="course" name="course">
                    <option value="cse">CSE</option>
                    <option value="ece">ECE</option>
                </select>
            </p>

            <p>
                <label>Gender:</label>
                <input type="radio" id="f" name="gender" value="f"> <label for="f">Female</label>
                <input type="radio" id="m" name="gender" value="m"> <label for="m">Male</label>
            </p>
            <p>
                <label>Interests:</label>
                <input type="checkbox" id="dev" name="int" value="dev"> <label for="dev">Development</label>
                <input type="checkbox" id="des" name="int" value="des"> <label for="des">Design</label>
            </p>

            <p>
                <label for="file">Upload Photo:</label>
                <input type="file" id="file" name="file">
            </p>
            <p>
                <label for="bio">Bio:</label><br>
                <textarea id="bio" name="bio" rows="3" cols="25"></textarea>
            </p>

            <p>
                <button type="submit">Submit</button>
            </p>
        </form>
    </main>

</body>
</html>
