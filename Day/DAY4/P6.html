<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class selector</title>
    <style>
        .highlight{
            background-color: rgb(19, 187, 103);
        }
        /* dot indicates the class that you have created */
    </style>
</head>
<body>
    <p class="highlight">
        JAHNVI
    </p>
    <p>Shukla</p>
</body>
</html>
